version: "3.9"

# ─────────────────────────────────────────────
#  Nimbus App — Docker Compose
#  Services: php (Laravel), nginx, mysql, redis, frontend (React)
#  All services share the 'nimbus' bridge network.
# ─────────────────────────────────────────────

services:

  # ── PHP 8.3-FPM (Laravel 11) ──────────────
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        APP_UID: ${APP_UID:-1000}
        APP_GID: ${APP_GID:-1000}
    container_name: nimbus_php
    restart: unless-stopped
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-nimbus}
      DB_USERNAME: ${DB_USERNAME:-nimbus_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nimbus

  # ── Nginx (reverse proxy for Laravel) ─────
  nginx:
    image: nginx:stable-alpine
    container_name: nimbus_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - nimbus

  # ── MySQL 8 ───────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: nimbus_mysql
    restart: unless-stopped
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-nimbus}
      MYSQL_USER: ${DB_USERNAME:-nimbus_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nimbus

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nimbus_redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-redissecret}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nimbus

  # ── React Frontend ────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      target: production
    container_name: nimbus_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - nginx
    networks:
      - nimbus

# ── Named volumes ──────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# ── Shared network ─────────────────────────
networks:
  nimbus:
    driver: bridge
